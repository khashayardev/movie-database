name: Update Movie Database

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-movies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Fetch movies from TMDB
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}  # تغییر نام به ACCESS_TOKEN
        run: python fetch_movies.py
      
      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "data/*.json"
          tag: "v1.0.0"
          allowUpdates: true
          omitBody: true
          omitName: true
          replacesArtifacts: true
