<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieBase | Complete Movie Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,background:#0a0e1a;color:#eef5ff}
        .bg-gradient{position:fixed;inset:0;background:radial-gradient(circle at 20% 30%,#0f172a,#030614);z-index:-2}
        .stars{position:fixed;inset:0;background-image:radial-gradient(2px 2px at 20px 30px,#fff,transparent),radial-gradient(1px 1px at 60px 80px,#f8fafc,transparent);background-size:200px 200px,150px 150px;opacity:.2;pointer-events:none;z-index:-1}
        .container{max-width:1440px;margin:0 auto;padding:1.5rem}
        .hero{text-align:center;margin:2rem 0}
        .hero h1{font-size:3.5rem;font-weight:800;background:linear-gradient(135deg,#c084fc,#60a5fa,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent}
        .glass-card{background:rgba(15,25,45,.7);backdrop-filter:blur(12px);border-radius:2rem;padding:1.8rem;margin-bottom:2rem;border:1px solid rgba(79,70,229,.3)}
        .search-row{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem}
        .search-wrapper{flex:2;position:relative}
        .search-wrapper i{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#6b7280}
        #searchInput{width:100%;padding:1rem 1rem 1rem 3rem;background:#0f172a;border:1px solid #334155;border-radius:2rem;color:white;font-size:1rem}
        .btn-primary{background:linear-gradient(105deg,#4f46e5,#7c3aed);border:none;padding:0 2rem;border-radius:2rem;font-weight:600;color:white;cursor:pointer;display:flex;align-items:center;gap:8px}
        .filter-group{display:flex;flex-wrap:wrap;gap:1rem;align-items:center;margin-bottom:1rem}
        .filter-select{background:#0f172a;border:1px solid #334155;padding:.6rem 1.2rem;border-radius:2rem;color:white}
        .year-chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.8rem}
        .chip{background:#1e293b;padding:.4rem 1rem;border-radius:30px;font-size:.8rem;cursor:pointer;color:#cbd5e1}
        .chip.active,.chip:hover{background:#4f46e5;color:white}
        .stats-bar{background:#0f172a80;border-radius:2rem;padding:.8rem 1.5rem;margin-bottom:2rem;display:flex;justify-content:space-between;flex-wrap:wrap}
        .movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1.8rem}
        .movie-card{background:#111827cc;border-radius:1.5rem;overflow:hidden;cursor:pointer;border:1px solid #2d3748;transition:.3s}
        .movie-card:hover{transform:translateY(-8px);border-color:#7c3aed}
        .poster{width:100%;aspect-ratio:2/3;object-fit:cover}
        .movie-info{padding:1rem}
        .movie-title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .movie-meta{display:flex;justify-content:space-between;font-size:.75rem;color:#9ca3af;margin-top:.5rem}
        .rating{color:#fbbf24}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:2000;align-items:center;justify-content:center}
        .modal-card{background:#0f172a;max-width:820px;width:90%;max-height:85vh;overflow-y:auto;border-radius:2rem;padding:1.5rem;border:1px solid #4f46e5}
        .close-modal{float:right;font-size:1.8rem;cursor:pointer;background:#1e293b;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%}
        .close-modal:hover{background:#ef4444;color:white}
        .modal-poster{width:100%;max-height:300px;object-fit:cover;border-radius:1rem;margin:1rem 0}
        .loading-skeleton{display:flex;justify-content:center;align-items:center;gap:1rem;color:#94a3b8;padding:3rem}
        .footer{text-align:center;margin-top:3rem;font-size:.8rem;color:#475569}
        @media (max-width:640px){.hero h1{font-size:2.2rem}.movies-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="stars"></div>
<div class="container">
    <div class="hero"><h1><i class="fas fa-film"></i> MovieBase</h1><p>Powered by TMDB · 1990–2026 Complete Archive</p></div>
    <div class="glass-card">
        <div class="search-row">
            <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search by title, actor, director..."></div>
            <button class="btn-primary" id="searchBtn"><i class="fas fa-arrow-right"></i> Search</button>
        </div>
        <div class="filter-group">
            <select id="yearSelect" class="filter-select"></select>
            <select id="ratingSelect" class="filter-select"><option value="all">⭐ All ratings</option><option value="6">6+</option><option value="7">7+</option><option value="8">8+</option><option value="9">9+</option></select>
            <span style="margin-left:auto"><i class="fas fa-database"></i> <span id="movieCountBadge">0</span> films</span>
        </div>
        <div class="year-chips" id="yearChips"></div>
    </div>
    <div class="stats-bar" id="statsBar"><span><i class="fas fa-spinner fa-pulse"></i> Initializing...</span></div>
    <div id="moviesContainer" class="movies-grid"><div class="loading-skeleton"><i class="fas fa-compact-disc fa-spin"></i> Loading movies from GitHub...</div></div>
    <div class="footer"><i class="fab fa-github"></i> Data from GitHub Releases | TMDB</div>
</div>
<div id="detailModal" class="modal"><div class="modal-card"><div class="close-modal" id="modalCloseBtn">&times;</div><div id="modalBody"></div></div></div>

<script>
    // ============================================================
    // 🔴 فقط این خط را به نام مخزن خود تغییر دهید 🔴
    const REPO_NAME = 'movie-database';   // ← اینجا نام مخزن خود را بنویس
    // ============================================================
    const TAG = 'v1.0.0';
    
    function getJsonUrl(year) {
        return `https://raw.githubusercontent.com/${REPO_NAME}/${TAG}/data/movies_${year}.json`;
    }
    
    let allMovies = [];
    let moviesMap = new Map();
    
    async function loadYear(year) {
        try {
            const resp = await fetch(getJsonUrl(year));
            if (!resp.ok) return 0;
            const data = await resp.json();
            if (data && data.movies) {
                let added = 0;
                for (const m of data.movies) {
                    if (!moviesMap.has(m.id)) {
                        moviesMap.set(m.id, m);
                        allMovies.push(m);
                        added++;
                    }
                }
                return added;
            }
            return 0;
        } catch(e) {
            console.warn(`Year ${year} failed`, e);
            return 0;
        }
    }
    
    async function loadAll() {
        const years = [];
        for (let y = 1990; y <= 2026; y++) years.push(y);
        let total = 0;
        const stats = document.getElementById('statsBar');
        for (let i = 0; i < years.length; i++) {
            const y = years[i];
            stats.innerHTML = `<span><i class="fas fa-cloud-download-alt"></i> Loading ${y}... (${i+1}/${years.length})</span>`;
            const count = await loadYear(y);
            if (count > 0) total += count;
            await new Promise(r => setTimeout(r, 30));
        }
        return total;
    }
    
    function extractYears() {
        const set = new Set();
        allMovies.forEach(m => {
            if (m.release_date) {
                const yr = new Date(m.release_date).getFullYear();
                if (!isNaN(yr)) set.add(yr);
            }
        });
        return Array.from(set).sort((a,b) => b - a);
    }
    
    function populateUI() {
        const years = extractYears();
        const yearSelect = document.getElementById('yearSelect');
        yearSelect.innerHTML = '<option value="all">All Years</option>';
        years.forEach(y => {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            yearSelect.appendChild(opt);
        });
        const chipsDiv = document.getElementById('yearChips');
        chipsDiv.innerHTML = '';
        years.slice(0,30).forEach(y => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.textContent = y;
            chip.onclick = () => {
                yearSelect.value = y;
                applyFilters();
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
            };
            chipsDiv.appendChild(chip);
        });
        document.getElementById('movieCountBadge').innerText = allMovies.length.toLocaleString();
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
    
    function getFiltered() {
        let filtered = [...allMovies];
        const term = document.getElementById('searchInput').value.trim().toLowerCase();
        const year = document.getElementById('yearSelect').value;
        const minRating = document.getElementById('ratingSelect').value === 'all' ? 0 : parseFloat(document.getElementById('ratingSelect').value);
        
        if (term) {
            filtered = filtered.filter(m => 
                m.title?.toLowerCase().includes(term) ||
                m.overview?.toLowerCase().includes(term) ||
                m.credits?.cast?.some(c => c.name?.toLowerCase().includes(term)) ||
                m.credits?.crew?.some(c => c.name?.toLowerCase().includes(term))
            );
        }
        if (year !== 'all') {
            filtered = filtered.filter(m => m.release_date && new Date(m.release_date).getFullYear() == year);
        }
        if (minRating > 0) {
            filtered = filtered.filter(m => m.vote_average >= minRating);
        }
        filtered.sort((a,b) => (b.vote_average||0) - (a.vote_average||0));
        return filtered;
    }
    
    function renderMovies(movies) {
        const container = document.getElementById('moviesContainer');
        if (!movies.length) {
            container.innerHTML = '<div class="loading-skeleton">😢 No results found.</div>';
            return;
        }
        container.innerHTML = movies.slice(0,100).map(m => {
            const poster = m.poster_path ? `https://image.tmdb.org/t/p/w342${m.poster_path}` : 'https://placehold.co/342x513/1e293b/475569?text=No+Poster';
            const year = m.release_date ? new Date(m.release_date).getFullYear() : '—';
            return `<div class="movie-card" data-id="${m.id}"><img class="poster" src="${poster}" loading="lazy"><div class="movie-info"><div class="movie-title">${escapeHtml(m.title)}</div><div class="movie-meta"><span>${year}</span><span class="rating"><i class="fas fa-star"></i> ${m.vote_average?.toFixed(1)||'?'}</span></div></div></div>`;
        }).join('');
        document.querySelectorAll('.movie-card').forEach(card => {
            card.addEventListener('click', () => {
                const movie = allMovies.find(m => m.id == card.dataset.id);
                if (movie) showModal(movie);
            });
        });
    }
    
    function showModal(movie) {
        const modalBody = document.getElementById('modalBody');
        const backdrop = movie.backdrop_path ? `https://image.tmdb.org/t/p/w780${movie.backdrop_path}` : (movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : '');
        modalBody.innerHTML = `
            <h2>${escapeHtml(movie.title)}</h2>
            ${backdrop ? `<img class="modal-poster" src="${backdrop}">` : ''}
            <p><strong>⭐ ${movie.vote_average?.toFixed(1)}/10</strong> (${movie.vote_count} votes)</p>
            <p>📅 ${movie.release_date || 'N/A'} | ⏱️ ${movie.runtime || '?'} min</p>
            <p>🎭 Genres: ${movie.genres?.map(g=>g.name).join(', ')||'—'}</p>
            <p>📖 ${escapeHtml(movie.overview || 'No overview')}</p>
        `;
        document.getElementById('detailModal').style.display = 'flex';
    }
    
    function applyFilters() {
        const filtered = getFiltered();
        renderMovies(filtered);
        document.getElementById('statsBar').innerHTML = `<span><i class="fas fa-filter"></i> Showing ${filtered.length} of ${allMovies.length} movies</span>`;
    }
    
    document.getElementById('searchBtn').onclick = applyFilters;
    document.getElementById('searchInput').onkeypress = e => { if(e.key === 'Enter') applyFilters(); };
    document.getElementById('yearSelect').onchange = applyFilters;
    document.getElementById('ratingSelect').onchange = applyFilters;
    document.getElementById('modalCloseBtn').onclick = () => document.getElementById('detailModal').style.display = 'none';
    window.onclick = e => { if(e.target === document.getElementById('detailModal')) document.getElementById('detailModal').style.display = 'none'; };
    
    (async function() {
        const stats = document.getElementById('statsBar');
        try {
            await loadAll();
            if (allMovies.length === 0) throw new Error('No movies found. Check release tag and file paths.');
            populateUI();
            applyFilters();
            stats.innerHTML = `<span><i class="fas fa-check-circle"></i> ✅ ${allMovies.length} movies · ${extractYears().length} years</span>`;
        } catch(err) {
            stats.innerHTML = `<span><i class="fas fa-exclamation-triangle"></i> ${err.message}</span>`;
            document.getElementById('moviesContainer').innerHTML = `<div class="loading-skeleton">❌ ${err.message}<br>Make sure:<br>1. Release tag '${TAG}' exists<br>2. Files like 'movies_1990.json' are in /data/ folder<br>3. Repository name is correct: '${REPO_NAME}'</div>`;
        }
    })();
</script>
</body>
</html>
